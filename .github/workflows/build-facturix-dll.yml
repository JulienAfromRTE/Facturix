name: Build Facturix.dll (Notepad++ plugin)

# Compile le plugin natif Notepad++ (DLL x64) par cross-compilation MinGW-w64
# sur un runner Ubuntu, et publie Facturix.dll en artefact telechargeable.
#
# Declenchement :
#   - automatiquement a chaque push touchant notepad++/native/**
#   - manuellement via l'onglet "Actions" (workflow_dispatch)
#   - sur un tag "facturix-v*" : cree en plus une Release avec le DLL.

on:
  push:
    paths:
      - 'notepad\+\+/native/**'
      - '.github/workflows/build-facturix-dll.yml'
  workflow_dispatch:
  release:
    types: [created]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Installer MinGW-w64
        run: |
          sudo apt-get update
          sudo apt-get install -y g++-mingw-w64-x86-64

      - name: Compiler Facturix.dll
        run: |
          cd notepad++/native
          bash build_mingw.sh

      - name: Publier l'artefact (telechargeable depuis l'onglet Actions)
        uses: actions/upload-artifact@v4
        with:
          name: Facturix-dll-x64
          path: notepad++/native/Facturix.dll
          if-no-files-found: error

      - name: Joindre le DLL a la Release (si tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: notepad++/native/Facturix.dll
