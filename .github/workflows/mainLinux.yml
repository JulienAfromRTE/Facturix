name: Build Linux Package

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Générer horodatage
        id: timestamp
        run: |
          TS=$(date +'%Y%m%d_%H%M')
          PKG="FacturX_V11_Linux_$TS"
          echo "PKG_NAME=$PKG" >> $GITHUB_OUTPUT
          echo "Nom du package : $PKG"

      - name: Créer la structure du package
        run: |
          PKG="${{ steps.timestamp.outputs.PKG_NAME }}"
          mkdir -p "$PKG"

          # Fichiers de l'application
          cp facturx_webapp_v11.py "$PKG/"
          cp mapping_v5_simple.json "$PKG/" 2>/dev/null || echo "mapping simple absent (a copier manuellement)"
          cp mapping_v5_groupee.json "$PKG/" 2>/dev/null || echo "mapping groupee absent (a copier manuellement)"

          # Script d'installation automatique
          cat > "$PKG/install.sh" << 'INSTALL'
#!/bin/bash
set -e
echo "======================================================"
echo "  INSTALLATION FACTUR-X V11 - Oracle Linux"
echo "======================================================"

APP_DIR="/opt/facturx"
SERVICE_USER="facturx"
PORT=5000

# 1. Dépendances système
echo "[1/6] Installation des dépendances système..."
sudo dnf install -y python3 python3-pip python3-virtualenv nginx 2>/dev/null || \
sudo yum install -y python3 python3-pip python3-virtualenv nginx

# 2. Créer l'utilisateur dédié
echo "[2/6] Création de l'utilisateur $SERVICE_USER..."
sudo useradd -r -s /bin/false -d $APP_DIR $SERVICE_USER 2>/dev/null || echo "Utilisateur déjà existant"

# 3. Créer le dossier de l'application
echo "[3/6] Déploiement des fichiers..."
sudo mkdir -p $APP_DIR
sudo cp facturx_webapp_v11.py $APP_DIR/
sudo cp mapping_v5_simple.json $APP_DIR/ 2>/dev/null || echo "  -> mapping simple : à copier manuellement dans $APP_DIR"
sudo cp mapping_v5_groupee.json $APP_DIR/ 2>/dev/null || echo "  -> mapping groupee : à copier manuellement dans $APP_DIR"
sudo mkdir -p $APP_DIR/uploads_temp

# 4. Environnement Python virtuel + dépendances
echo "[4/6] Installation des dépendances Python..."
sudo python3 -m venv $APP_DIR/venv
sudo $APP_DIR/venv/bin/pip install --upgrade pip --quiet
sudo $APP_DIR/venv/bin/pip install flask PyPDF2 lxml openpyxl gunicorn --quiet

# 5. Droits
sudo chown -R $SERVICE_USER:$SERVICE_USER $APP_DIR

# 6. Service systemd
echo "[5/6] Création du service systemd..."
sudo tee /etc/systemd/system/facturx.service > /dev/null << SERVICE
[Unit]
Description=Factur-X V11 - Application de controle
After=network.target

[Service]
Type=simple
User=$SERVICE_USER
WorkingDirectory=$APP_DIR
ExecStart=$APP_DIR/venv/bin/gunicorn \
    --workers 2 \
    --bind 0.0.0.0:$PORT \
    --timeout 120 \
    --access-logfile $APP_DIR/access.log \
    --error-logfile $APP_DIR/error.log \
    facturx_webapp_v11:app
Restart=on-failure
RestartSec=5s
StandardOutput=journal
StandardError=journal

[Install]
WantedBy=multi-user.target
SERVICE

sudo systemctl daemon-reload
sudo systemctl enable facturx
sudo systemctl start facturx

# 7. Nginx reverse proxy
echo "[6/6] Configuration Nginx..."
SERVER_IP=$(hostname -I | awk '{print $1}')
sudo tee /etc/nginx/conf.d/facturx.conf > /dev/null << NGINX
server {
    listen 80;
    server_name _;

    client_max_body_size 50M;

    location / {
        proxy_pass http://127.0.0.1:$PORT;
        proxy_set_header Host \$host;
        proxy_set_header X-Real-IP \$remote_addr;
        proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
    }
}
NGINX

sudo nginx -t && sudo systemctl enable nginx && sudo systemctl restart nginx

# Ouvrir le pare-feu si firewalld actif
if systemctl is-active --quiet firewalld; then
    echo "  -> Ouverture du port 80 dans firewalld..."
    sudo firewall-cmd --permanent --add-service=http
    sudo firewall-cmd --reload
fi

# SELinux : autoriser nginx -> gunicorn si SELinux actif
if command -v getenforce &>/dev/null && [ "$(getenforce)" != "Disabled" ]; then
    echo "  -> SELinux détecté : autorisation du proxy réseau..."
    sudo setsebool -P httpd_can_network_connect 1
fi

echo ""
echo "======================================================"
echo "  INSTALLATION TERMINÉE !"
echo "======================================================"
echo ""
echo "  Application accessible sur : http://$SERVER_IP"
echo "  Logs d'erreur : $APP_DIR/error.log"
echo "  Logs d'accès  : $APP_DIR/access.log"
echo ""
echo "  Commandes utiles :"
echo "    sudo systemctl status facturx    # état du service"
echo "    sudo systemctl restart facturx   # redémarrer"
echo "    sudo journalctl -u facturx -f    # logs en direct"
echo ""
INSTALL

          # Script de mise à jour
          cat > "$PKG/update.sh" << 'UPDATE'
#!/bin/bash
set -e
APP_DIR="/opt/facturx"
echo "Mise à jour de Factur-X..."
sudo cp facturx_webapp_v11.py $APP_DIR/
sudo chown facturx:facturx $APP_DIR/facturx_webapp_v11.py
sudo systemctl restart facturx
echo "✅ Mise à jour et redémarrage effectués."
sudo systemctl status facturx --no-pager
UPDATE

          chmod +x "$PKG/install.sh"
          chmod +x "$PKG/update.sh"

          echo "--- Contenu du package ---"
          ls -la "$PKG/"

      - name: Créer l'archive tar.gz
        run: |
          PKG="${{ steps.timestamp.outputs.PKG_NAME }}"
          tar -czf "${PKG}.tar.gz" "$PKG/"
          ls -lh "${PKG}.tar.gz"

      - name: Upload du package Linux
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.timestamp.outputs.PKG_NAME }}
          path: ${{ steps.timestamp.outputs.PKG_NAME }}.tar.gz
          retention-days: 30
